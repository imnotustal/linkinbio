<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pettanko | verified</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; height: 100vh; overflow: hidden; }

        /* Splash Screen (Для автоплея) */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex;
            align-items: center; justify-content: center; transition: 1s;
        }
        .enter-text { letter-spacing: 5px; opacity: 0.5; animation: blink 2s infinite; }

        /* Видео-фон */
        .bg-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        .bg-wrap iframe { width: 100vw; height: 100vh; transform: scale(1.3); filter: brightness(0.3) grayscale(1); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent, #000 110%); z-index: -1; }

        /* Карточка */
        .container { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card {
            background: rgba(5, 5, 5, 0.4); backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px;
            padding: 40px; width: 400px; text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); z-index: 50;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.1); box-shadow: 0 10px 60px rgba(0,0,0,1); }

        /* Имена и Галочка */
        .nick-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .nickname { font-size: 32px; letter-spacing: 5px; font-weight: 700; text-transform: uppercase; }
        
        .verify-icon { color: #fff; font-size: 18px; position: relative; }
        .verify-icon:hover::after {
            content: "VERIFIED FEMBOY"; position: absolute; bottom: 25px; left: 50%;
            transform: translateX(-50%); font-size: 10px; background: #fff; color: #000;
            padding: 2px 8px; border-radius: 4px; white-space: nowrap; font-weight: 700;
        }

        /* Соцсети */
        .socials { display: flex; justify-content: center; gap: 20px; margin: 25px 0; }
        .social-link { color: #555; font-size: 24px; transition: 0.3s; }
        .social-link:hover { color: #fff; filter: drop-shadow(0 0 8px #fff); transform: scale(1.2); }

        /* Субтитры */
        .lyrics-box { height: 40px; display: flex; align-items: center; justify-content: center; margin: 15px 0; }
        #lyric-text { font-size: 14px; color: #888; transition: 0.5s; text-shadow: 0 0 10px rgba(255,255,255,0.1); }

        /* Просмотры */
        .counter { margin-top: 20px; opacity: 0.3; font-size: 11px; }

        /* Частицы и Курсор */
        canvas#ash { position: fixed; top: 0; left: 0; z-index: 9999; pointer-events: none; }
        .cursor { position: fixed; width: 10px; height: 10px; background: #fff; border-radius: 50%; z-index: 10001; mix-blend-mode: difference; pointer-events: none; }

        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

<div id="splash" onclick="startBio()">
    <div class="enter-text">CLICK TO ENTER</div>
</div>

<div class="cursor"></div>
<canvas id="ash"></canvas>

<div class="bg-wrap">
    <iframe src="https://www.youtube.com/embed/e_yUWgAzSjs?autoplay=1&mute=1&loop=1&playlist=e_yUWgAzSjs&controls=0&showinfo=0&rel=0" frameborder="0"></iframe>
</div>
<div id="audio-player"></div>
<div class="overlay"></div>

<div class="container">
    <main class="card">
        <div class="nick-row">
            <h1 class="nickname">pettanko</h1>
            <div class="verify-icon"><i class="fas fa-check-circle"></i></div>
        </div>
        <p style="color:#444; font-size:12px; letter-spacing:3px;">POLAND</p>

        <div class="socials">
            <a href="https://steamcommunity.com/id/pettank0/" target="_blank" class="social-link"><i class="fab fa-steam"></i></a>
            <a href="https://discordapp.com/users/1131173686221754398" target="_blank" class="social-link"><i class="fab fa-discord"></i></a>
        </div>

        <div class="lyrics-box">
            <p id="lyric-text">...</p>
        </div>

        <div class="counter">
            <i class="fas fa-eye"></i>
            <!-- ЗАМЕНИ ТУТ НА СВОЙ РЕПОЗИТОРИЙ -->
            <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fgithub.com%2Fimnotustal-creator%2Flinkinbio&count_bg=%23000000&title_bg=%23000000&icon=&icon_color=%23E7E7E7&title=views&edge_flat=true" alt="views">
        </div>
    </main>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const cursor = document.querySelector('.cursor');
    const canvas = document.getElementById('ash');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let audioPlayer;

    // 1. YouTube Audio
    function onYouTubeIframeAPIReady() {
        audioPlayer = new YT.Player('audio-player', {
            height: '0', width: '0', videoId: 'fgEn4S7BVNI',
            playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': 'fgEn4S7BVNI' },
            events: { 'onStateChange': onPlayerStateChange }
        });
    }

    function startBio() {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => document.getElementById('splash').remove(), 1000);
        audioPlayer.playVideo();
        syncLyrics();
    }

    // 2. Субтитры (Синхронизация по времени)
    const subData = [
        { t: 0, text: "Yung Fimoz & Migas — Labubu" },
        { t: 10, text: "Я в Лабубу, я в Лабубу" },
        { t: 13, text: "Она танцует на моем гробу" },
        { t: 15, text: "Я в Лабубу, я в Лабубу" },
        { t: 18, text: "Она танцует на моем гробу" },
        { t: 21, text: "Стиль — это мрак, стиль — это тень" },
        { t: 25, text: "Я пропадаю каждый божий день" }
    ];

    function syncLyrics() {
        setInterval(() => {
            const curTime = audioPlayer.getCurrentTime();
            const active = [...subData].reverse().find(s => curTime >= s.t);
            if (active) document.getElementById('lyric-text').innerText = active.text;
        }, 500);
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) audioPlayer.playVideo();
    }

    // 3. Прах и Курсор
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        for(let i=0; i<5; i++) particles.push(new Particle(e.clientX, e.clientY));
    });

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.s = Math.random() * 2;
            this.vx = Math.random() * 2 - 1;
            this.vy = Math.random() * -2;
            this.o = 1;
        }
        draw() {
            ctx.fillStyle = `rgba(255,255,255,${this.o})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill();
        }
        update() {
            this.x += this.vx; this.y += this.vy; this.o -= 0.01;
        }
    }

    function animate() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        particles = particles.filter(p => p.o > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
