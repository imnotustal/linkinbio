<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pettanko | Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-black: #050505;
            --glass: rgba(8, 8, 8, 0.4);
            --glass-hover: rgba(15, 15, 15, 0.5);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.18);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; height: 100vh; overflow: hidden; }

        /* SPLASH */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex;
            align-items: center; justify-content: center;
            transition: opacity 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .splash-text {
            letter-spacing: 12px; font-weight: 300; font-size: 13px;
            animation: splashPulse 2.4s ease-in-out infinite;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
        }
        @keyframes splashPulse { 0%,100% { opacity: 0.3; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } }

        /* BACKGROUND */
        .bg-vid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        .bg-vid iframe { width: 100vw; height: 100vh; transform: scale(1.5); filter: brightness(0.2) grayscale(1); }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, #000 90%);
            z-index: -1;
        }

        /* CURSOR */
        canvas#ash { position: fixed; top: 0; left: 0; z-index: 9999; pointer-events: none; }
        .cursor {
            position: fixed; width: 8px; height: 8px; background: #fff; border-radius: 50%;
            z-index: 10001; mix-blend-mode: difference; pointer-events: none;
            transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease;
        }
        .cursor.hovering { width: 24px; height: 24px; background: rgba(255,255,255,0.8); }

        /* CARD */
        .container { height: 100vh; display: flex; align-items: center; justify-content: center; z-index: 50; position: relative; }
        .card {
            background: var(--glass);
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 50px 40px;
            width: 420px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            animation: cardIn 1.4s cubic-bezier(0.19, 1, 0.22, 1) both;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--border-hover); background: var(--glass-hover); }
        @keyframes cardIn { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* AVATAR */
        .avatar-wrap { position: relative; width: 115px; height: 115px; margin: 0 auto 25px; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
        .status-dot {
            position: absolute; bottom: 6px; right: 6px; width: 18px; height: 18px;
            border-radius: 50%; border: 3px solid #080808; background: #747f8d;
            transition: all 0.4s ease;
        }
        .status-dot.online { background: #43b581; box-shadow: 0 0 12px #43b581; }
        .status-dot.dnd { background: #f04747; box-shadow: 0 0 12px #f04747; }
        .status-dot.idle { background: #faa61a; box-shadow: 0 0 12px #faa61a; }

        /* INFO */
        .nickname { font-size: 32px; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 4px; }
        .role-tag { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 25px; }
        .divider { width: 50px; height: 1px; background: rgba(255,255,255,0.1); margin: 0 auto 25px; }

        /* LINKS */
        .links { display: flex; justify-content: center; gap: 25px; margin-bottom: 30px; }
        .link-item { color: rgba(255,255,255,0.4); font-size: 22px; transition: all 0.3s; }
        .link-item:hover { color: #fff; transform: translateY(-3px) scale(1.1); filter: drop-shadow(0 0 8px #fff); }

        /* LYRICS */
        .lyrics-box {
            min-height: 60px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; padding: 15px; margin-bottom: 20px;
        }
        #lyrics-text {
            font-size: 11px; color: rgba(255,255,255,0.6);
            text-transform: uppercase; letter-spacing: 1.5px; line-height: 1.5;
            transition: opacity 0.3s, transform 0.3s;
        }
        #lyrics-text.fade { opacity: 0; transform: translateY(5px); }

        /* CONTROLS */
        .music-controls { display: flex; align-items: center; justify-content: center; gap: 15px; }
        .music-controls button { background: none; border: none; color: #fff; opacity: 0.5; font-size: 16px; transition: 0.3s; }
        .music-controls button:hover { opacity: 1; transform: scale(1.1); }
        .volume-slider { width: 80px; height: 3px; accent-color: #fff; opacity: 0.4; transition: 0.3s; }
        .volume-slider:hover { opacity: 0.8; }
        
        #dc-activity { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 15px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="splash" onclick="init()">
    <div class="splash-text">Click to enter</div>
</div>

<div class="cursor" id="cursor"></div>
<canvas id="ash"></canvas>

<div class="bg-vid">
    <iframe src="https://www.youtube.com/embed/e_yUWgAzSjs?autoplay=1&mute=1&loop=1&playlist=e_yUWgAzSjs&controls=0&showinfo=0&rel=0" frameborder="0"></iframe>
</div>

<!-- Музыкальный плеер (скрыт) -->
<div id="player"></div>

<div class="overlay"></div>

<div class="container">
    <main class="card">
        <div class="avatar-wrap">
            <img src="https://yt3.googleusercontent.com/Bkci2EwxZpc5lXCBD6sP2oEWNALIQVC77fH06Dmak8DLrOW-MXybnfCKhElcZD1BB6vVQNIsrA=s900-c-k-c0x00ffffff-no-rj" class="avatar" alt="pettanko">
            <div class="status-dot" id="dot"></div>
        </div>
        
        <h1 class="nickname">pettanko</h1>
        <p class="role-tag">Developer & Designer</p>
        
        <div class="divider"></div>
        
        <div class="links">
            <a href="https://steamcommunity.com/id/pettank0/" target="_blank" class="link-item"><i class="fab fa-steam"></i></a>
            <a href="https://discordapp.com/users/1131173686221754398" target="_blank" class="link-item"><i class="fab fa-discord"></i></a>
            <a href="https://github.com/pettanko-bio" target="_blank" class="link-item"><i class="fab fa-github"></i></a>
        </div>

        <div class="lyrics-box">
            <p id="lyrics-text">Initializing...</p>
        </div>

        <div class="music-controls">
            <button id="playPauseBtn" onclick="togglePlay()"><i class="fas fa-pause"></i></button>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="50" oninput="setVolume(this.value)">
        </div>

        <div id="dc-activity">Connecting to Lanyard...</div>
    </main>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    /* ── CURSOR & ASH ── */
    const cursor = document.getElementById('cursor');
    const canvas = document.getElementById('ash');
    const ctx = canvas.getContext('2d');
    let particles = [];

    document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        for (let i = 0; i < 3; i++) particles.push(new Ash(e.clientX, e.clientY));
    });

    document.querySelectorAll('a, button').forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
    });

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    class Ash {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.s = Math.random() * 1.5 + 0.5;
            this.vx = (Math.random() - 0.5) * 1.2;
            this.vy = Math.random() * -2 - 1;
            this.a = 1;
        }
        update() { this.x += this.vx; this.y += this.vy; this.a -= 0.015; this.vy += 0.05; }
        draw() {
            ctx.fillStyle = `rgba(255,255,255,${this.a})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2); ctx.fill();
        }
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles = particles.filter(p => p.a > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(render);
    }
    render();

    /* ── YOUTUBE API ── */
    let ytPlayer;
    let isPlaying = false;

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            height: '0', width: '0',
            videoId: 'fgEn4S7BVNI', // ID твоего трека
            playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': 'fgEn4S7BVNI' },
            events: {
                'onReady': (e) => { e.target.setVolume(50); },
                'onStateChange': (e) => { isPlaying = (e.data === YT.PlayerState.PLAYING); }
            }
        });
    }

    function togglePlay() {
        if (!ytPlayer) return;
        const btn = document.getElementById('playPauseBtn');
        if (isPlaying) {
            ytPlayer.pauseVideo();
            btn.innerHTML = '<i class="fas fa-play"></i>';
        } else {
            ytPlayer.playVideo();
            btn.innerHTML = '<i class="fas fa-pause"></i>';
        }
    }

    function setVolume(v) { if(ytPlayer) ytPlayer.setVolume(v); }

    /* ── INIT ── */
    function init() {
        const splash = document.getElementById('splash');
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 1200);

        // Форсируем запуск музыки
        if (ytPlayer && ytPlayer.playVideo) {
            ytPlayer.unMute();
            ytPlayer.playVideo();
            startLyrics();
        }
        fetchDiscord();
        setInterval(fetchDiscord, 15000);
    }

    /* ── LYRICS ── */
    const lines = [
        { t: 0, txt: "YUNG FIMOZ & MIGAS — ЛАБУБУ" },
        { t: 8, txt: "Ка-ка-ка-ка-ка-ка-какой, нахуй, Лабубу?" },
        { t: 11, txt: "Сучка, закатай губу" },
        { t: 13, txt: "Если ещё раз услышу, в жопу тебя отъебу" },
        { t: 16, txt: "Хочешь выпить бабл-ти, но попьёшь моей кончи" },
        { t: 19, txt: "На Айпаде мои фотки, сиди молча и дрочи" },
        { t: 22, txt: "Эта сука — геншинфаг, весь в значках её рюкзак" },
        { t: 25, txt: "Тупорылая пизда, чё у тебя, блять, в мозгах?" },
        { t: 29, txt: "Эта сука — геншинфаг, весь в значках её рюкзак" },
        { t: 32, txt: "Тупорылая пизда, чё у тебя, блять, в мозгах?" },
        { t: 38, txt: "Е-е-если ты купил Лабубу, твою мать ебать я буду" },
        { t: 41, txt: "Хагги Вагги и Лабубу, выебу тебя — забуду" },
        { t: 44, txt: "Твою маму в рот ебу, не царапай, уебу" },
        { t: 47, txt: "Потом на тебя насру и Лабубой подтеру" },
        { t: 50, txt: "Насажу на хуй Лабубу за жвачку Хуба Бубу" },
        { t: 53, txt: "Выебу с ДВ альтуху, как и твою маму шлюху" }
    ];

    let currentIdx = -1;
    function startLyrics() {
        setInterval(() => {
            if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
            const time = ytPlayer.getCurrentTime();
            // Находим строку, которая соответствует текущему времени
            const activeLine = [...lines].reverse().find(l => time >= l.t);
            const activeIdx = lines.indexOf(activeLine);

            if (activeLine && activeIdx !== currentIdx) {
                currentIdx = activeIdx;
                const el = document.getElementById('lyrics-text');
                el.classList.add('fade');
                setTimeout(() => {
                    el.innerText = activeLine.txt;
                    el.classList.remove('fade');
                }, 300);
            }
        }, 200);
    }

    /* ── DISCORD ── */
    async function fetchDiscord() {
        const act = document.getElementById('dc-activity');
        const dot = document.getElementById('dot');
        try {
            const res = await fetch('https://api.lanyard.rest/v1/users/1131173686221754398');
            const { data } = await res.json();
            
            dot.className = 'status-dot ' + data.discord_status;
            
            if (data.listening_to_spotify) {
                act.innerText = `Listening to: ${data.spotify.song}`;
            } else if (data.activities.length > 0) {
                act.innerText = `Playing: ${data.activities[0].name}`;
            } else {
                act.innerText = data.discord_status.toUpperCase();
            }
        } catch (e) {
            act.innerText = "OFFLINE";
        }
    }
</script>
</body>
</html>
