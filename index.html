<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pettanko | Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-black: #050505; --glass: rgba(10, 10, 10, 0.4); --border: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; height: 100vh; overflow: hidden; }

        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex;
            align-items: center; justify-content: center; transition: 1s ease;
        }
        .splash-text { letter-spacing: 10px; font-weight: 300; animation: pulse 2s infinite; opacity: 0.6; }

        .bg-vid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        .bg-vid iframe { width: 100vw; height: 100vh; transform: scale(1.4); filter: brightness(0.2) grayscale(1); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent, #000 125%); z-index: -1; }

        canvas#ash { position: fixed; top: 0; left: 0; z-index: 9999; pointer-events: none; }
        .cursor { position: fixed; width: 10px; height: 10px; background: #fff; border-radius: 50%; z-index: 10001; mix-blend-mode: difference; pointer-events: none; transform: translate(-50%, -50%); }

        .container { height: 100vh; display: flex; align-items: center; justify-content: center; z-index: 50; position: relative; }
        .card {
            background: var(--glass); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--border); border-radius: 24px;
            padding: 40px; width: 420px; text-align: center;
            box-shadow: 0 0 80px rgba(0,0,0,0.9);
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .card:hover { transform: translateY(-8px); border-color: rgba(255,255,255,0.1); }

        .avatar-wrap { position: relative; width: 110px; height: 110px; margin: 0 auto 20px; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
        .status-dot { 
            position: absolute; bottom: 8px; right: 8px; width: 18px; height: 18px; 
            border-radius: 50%; border: 3px solid #0a0a0a; background: #747f8d; 
        }

        .name-container { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .nickname { font-size: 32px; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; }
        
        .verify { position: relative; color: #fff; font-size: 18px; }
        .verify:hover::after {
            content: "VERIFIED FEMBOY"; position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); font-size: 10px; background: #fff; color: #000;
            padding: 3px 10px; border-radius: 2px; white-space: nowrap; font-weight: 900;
        }

        .links { display: flex; justify-content: center; gap: 25px; margin: 25px 0; }
        .link-item { color: #555; font-size: 26px; transition: 0.4s ease; }
        .link-item:hover { color: #fff; transform: scale(1.25); filter: drop-shadow(0 0 10px #fff); }

        .lyrics-box { height: 60px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        #lyrics-text { font-size: 13px; color: #777; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.5s; line-height: 1.4; }

        #dc-activity { font-size: 11px; color: #444; margin-top: 10px; min-height: 14px; text-transform: uppercase; }

        .views { margin-top: 25px; opacity: 0.3; }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

<div id="splash" onclick="init()">
    <div class="splash-text">CLICK TO UNLOCK</div>
</div>

<div class="cursor"></div>
<canvas id="ash"></canvas>

<div class="bg-vid">
    <iframe src="https://www.youtube.com/embed/e_yUWgAzSjs?autoplay=1&mute=1&loop=1&playlist=e_yUWgAzSjs&controls=0&showinfo=0&rel=0" frameborder="0"></iframe>
</div>

<!-- Контейнер для музыки -->
<div id="player"></div>

<div class="overlay"></div>

<div class="container">
    <main class="card">
        <div class="avatar-wrap">
            <img src="https://yt3.googleusercontent.com/Bkci2EwxZpc5lXCBD6sP2oEWNALIQVC77fH06Dmak8DLrOW-MXybnfCKhElcZD1BB6vVQNIsrA=s900-c-k-c0x00ffffff-no-rj" class="avatar" alt="pettanko">
            <div class="status-dot" id="dot"></div>
        </div>

        <div class="name-container">
            <h1 class="nickname">pettanko</h1>
            <div class="verify"><i class="fas fa-check-circle"></i></div>
        </div>
        <p style="font-size: 10px; color: #333; letter-spacing: 5px; margin-bottom: 15px;">DEVELOPER</p>

        <div class="links">
            <a href="https://steamcommunity.com/id/pettank0/" target="_blank" class="link-item"><i class="fab fa-steam"></i></a>
            <a href="https://discordapp.com/users/1131173686221754398" target="_blank" class="link-item"><i class="fab fa-discord"></i></a>
        </div>

        <div class="lyrics-box">
            <p id="lyrics-text">WAITING...</p>
        </div>

        <div id="dc-activity">FETCHING DATA...</div>

        <div class="views">
            <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fpettanko-bio.github.io&count_bg=%23000000&title_bg=%23000000&icon=&icon_color=%23E7E7E7&title=views&edge_flat=true" alt="Views">
        </div>
    </main>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const cursor = document.querySelector('.cursor');
    const canvas = document.getElementById('ash');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let ytPlayer;

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            height: '0',
            width: '0',
            videoId: 'fgEn4S7BVNI',
            playerVars: { 
                'autoplay': 0, 
                'loop': 1, 
                'playlist': 'fgEn4S7BVNI' 
            },
            events: {
                'onReady': (event) => { console.log("Player Ready"); },
                'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) ytPlayer.playVideo(); }
            }
        });
    }

    function init() {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => document.getElementById('splash').remove(), 1000);
        
        if (ytPlayer && ytPlayer.playVideo) {
            ytPlayer.unMute();
            ytPlayer.setVolume(100);
            ytPlayer.playVideo();
        }
        
        syncLyrics();
        fetchDiscord();
        setInterval(fetchDiscord, 10000);
    }

    const lines = [
        { t: 0, txt: "YUNG FIMOZ & MIGAS — ЛАБУБУ" },
        { t: 9, txt: "Какой нахуй Лабубу? Сучка, закатай губу" },
        { t: 12, txt: "Если ещё раз услышу, в жопу тебя отъебу" },
        { t: 15, txt: "Хочешь выпить бабл-ти, но попьёшь моей кончи" },
        { t: 18, txt: "На Айпаде мои фотки, сиди молча и дрочи" },
        { t: 21, txt: "Эта сука — геншинфаг, весь в значках её рюкзак" },
        { t: 24, txt: "Тупорылая пизда, чё у тебя, блять, в мозгах?" },
        { t: 30, txt: "Если ты купил Лабубу, твою мать ебать я буду" },
        { t: 33, txt: "Хагги Вагги и Лабубу, выебу тебя — забуду" }
    ];

    function syncLyrics() {
        setInterval(() => {
            const time = ytPlayer.getCurrentTime();
            const current = [...lines].reverse().find(l => time >= l.t);
            if(current) document.getElementById('lyrics-text').innerText = current.txt;
        }, 300);
    }

    async function fetchDiscord() {
        try {
            const res = await fetch('https://api.lanyard.rest/v1/users/1131173686221754398');
            const { data } = await res.json();
            const dot = document.getElementById('dot');
            const act = document.getElementById('dc-activity');

            const statusColors = { online: '#43b581', dnd: '#f04747', idle: '#faa61a', offline: '#747f8d' };
            dot.style.background = statusColors[data.discord_status] || '#747f8d';

            if(data.listening_to_spotify) {
                act.innerText = `Listening to ${data.spotify.track}`;
            } else if (data.activities.length > 0) {
                act.innerText = `Playing ${data.activities[0].name}`;
            } else {
                act.innerText = data.discord_status;
            }
        } catch(e) { console.log("DC Error"); }
    }

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    window.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        for(let i=0; i<5; i++) particles.push(new Ash(e.clientX, e.clientY));
    });

    class Ash {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.s = Math.random() * 2;
            this.vx = Math.random() * 2 - 1;
            this.vy = Math.random() * -3;
            this.a = 1;
        }
        update() { this.x += this.vx; this.y += this.vy; this.a -= 0.015; }
        draw() {
            ctx.fillStyle = `rgba(255,255,255,${this.a})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill();
        }
    }

    function render() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        particles = particles.filter(p => p.a > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
